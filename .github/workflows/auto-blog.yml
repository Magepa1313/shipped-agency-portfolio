name: Auto Blog Post

on:
  schedule:
    - cron: '0 8 * * 1'  # Jeden Montag 8:00 UTC (= 9:00 Wien)
  workflow_dispatch:      # Manueller Trigger über GitHub UI

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate blog post
        run: python scripts/generate_blog_post.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@maximiliankuerner.at"
          git add posts/ blog.html sitemap.xml scripts/topics.json
          git commit -m "Auto blog post: $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
